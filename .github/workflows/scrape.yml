name: Scrape MSA Warnings

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行（UTC）= 日本時間 毎時9分
  workflow_dispatch:        # 手動実行ボタンも有効

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # JSONをコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install requests beautifulsoup4 lxml

      - name: スクレイパーを実行
        run: python scraper/scrape.py

      - name: 結果をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/warnings.json
          # 変更があった場合のみコミット
          git diff --staged --quiet || git commit -m "chore: update warnings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
